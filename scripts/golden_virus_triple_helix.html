        // Dynamic Backbone Links (Current State Springs)
        const backbones = [];
        for (let seed = 0; seed < 3; seed++) {
            const bbMat = new THREE.LineBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            const bbGeo = new THREE.BufferGeometry();
            const bbLine = new THREE.Line(bbGeo, bbMat);
            scene.add(bbLine);
            backbones.push({ mesh: bbLine, geo: bbGeo });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const posData = framesData[currentFrame];
            
            for (let i = 0; i < 9; i++) {
                const x = posData[i][0];
                const y = posData[i][2]; // Swap Z and Y for ThreeJS
                const z = posData[i][1];
                
                units[i].position.set(x, y, z);
                
                // Update Trail
                const tPos = trails[i].positions;
                // Shift old positions back
                for(let j = trailLength - 1; j > 0; j--) {
                    tPos[j*3] = tPos[(j-1)*3];
                    tPos[j*3+1] = tPos[(j-1)*3+1];
                    tPos[j*3+2] = tPos[(j-1)*3+2];
                }
                // Set new head
                tPos[0] = x;
                tPos[1] = y;
                tPos[2] = z;
                
                trails[i].geo.attributes.position.needsUpdate = true;
            }

            // Update Backbones
            for (let seed = 0; seed < 3; seed++) {
                const bbPos = new Float32Array(3 * 3);
                for (let u = 0; u < 3; u++) {
                    const idx = seed * 3 + u;
                    bbPos[u*3] = posData[idx][0];
                    bbPos[u*3+1] = posData[idx][2];
                    bbPos[u*3+2] = posData[idx][1];
                }
                backbones[seed].geo.setAttribute('position', new THREE.BufferAttribute(bbPos, 3));
            }

            currentFrame = (currentFrame + 1) % numFrames;
            
            // Render with composer for bloom
            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
